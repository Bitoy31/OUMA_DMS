<script>
// =====================================================
// GLOBAL STATE
// =====================================================
const App = {
  currentTab:     'dashboard',
  currentUser:    null,
  currentRole:    'DO',  // DO | DIRECTOR | DAS | ASSEC | USEC | COMMS | SECRETARY | ADMIN
  currentDivision:'DIV1',
  endorseTarget:  'Director',
  selectedFile:   null,
  googleDocLink:  '',
  currentDocId:   null,
  myDocs:         [],
  allDocs:        [],
  filters:        { myDocs: 'ALL', actions: 'ALL', allDocs: 'ALL', division: 'ALL' },
  searchQueries:  {},
  roleConfig:     {}
};

// Role color mappings for consistency
const ROLE_COLORS = {
  'ADMIN': { bg: '#8b5cf6', light: '#ede9fe', text: '#5b21b6' },
  'SECRETARY': { bg: '#ec4899', light: '#fce7f3', text: '#831843' },
  'USEC': { bg: '#0ea5e9', light: '#cffafe', text: '#082f49' },
  'ASSEC': { bg: '#06b6d4', light: '#cffafe', text: '#164e63' },
  'DAS': { bg: '#14b8a6', light: '#ccfbf1', text: '#134e4a' },
  'DIRECTOR': { bg: '#3b82f6', light: '#dbeafe', text: '#1e3a8a' },
  'COMMS': { bg: '#f59e0b', light: '#fef3c7', text: '#78350f' },
  'DO': { bg: '#8b5cf6', light: '#f3e8ff', text: '#5b21b6' }
};

// =====================================================
// INIT
// =====================================================
window.addEventListener('load', () => {
  // Check if user is logged in
  loadUserSession();
  
  // If no session, redirect to login
  if (!App.currentUser) {
    window.location.href = '?view=login';
    return;
  }

  // Get role config from server
  if (typeof google !== 'undefined') {
    google.script.run
      .withSuccessHandler(onRoleConfigLoaded)
      .withFailureHandler(() => initializeUI())
      .getRoleConfig(App.currentRole);
  }

  // Initialize UI
  initializeUI();
});

function loadUserSession() {
  // Try to load from localStorage (set by login page)
  const userJson = localStorage.getItem('ouma_user');
  if (userJson) {
    try {
      App.currentUser = JSON.parse(userJson);
      App.currentRole = App.currentUser.role;
      App.currentDivision = App.currentUser.division || 'DIV1';
      return;
    } catch (e) {}
  }

  // If no localStorage session, try to get from server
  if (typeof google !== 'undefined') {
    google.script.run
      .withSuccessHandler(onSessionLoaded)
      .withFailureHandler(() => {
        // No session, redirect to login
        window.location.href = '?view=login';
      })
      .getCurrentUserSession();
  }
}

function onSessionLoaded(user) {
  if (user) {
    App.currentUser = user;
    App.currentRole = user.role;
    App.currentDivision = user.division || 'DIV1';
    localStorage.setItem('ouma_user', JSON.stringify(user));
    updateUserDisplay();
  } else {
    window.location.href = '?view=login';
  }
}

function onRoleConfigLoaded(config) {
  if (config) {
    App.roleConfig = config;
    updateNavigationBasedOnRole();
    loadDashboard();
  }
}

function initializeUI() {
  // Hide loading screen after animation
  setTimeout(() => {
    const ls = document.getElementById('loadingScreen');
    if (ls) { ls.style.display = 'none'; }
    const shell = document.getElementById('appShell');
    if (shell) { shell.style.display = 'flex'; }
  }, 2200);

  startClock();
  updateUserDisplay();
  setupSidebarToggle();
  setupMobileToggle();
  updateNavigationBasedOnRole();

  // Init tab
  switchTab('dashboard');

  // Load user profile
  loadUserProfile();
  loadDashboard();
}

// =====================================================
// ROLE-BASED UI CUSTOMIZATION
// =====================================================

/**
 * Updates navigation items based on user role
 */
function updateNavigationBasedOnRole() {
  const role = App.currentRole;
  const navItems = {
    'ADMIN': ['dashboard', 'newsubmission', 'mysubmissions', 'actionrequired', 'alldocuments', 'printing', 'outgoing', 'completed', 'archive', 'settings'],
    'SECRETARY': ['dashboard', 'alldocuments', 'esignature', 'printing', 'outgoing', 'completed', 'settings'],
    'USEC': ['dashboard', 'actionrequired', 'alldocuments', 'printing', 'completed', 'settings'],
    'ASSEC': ['dashboard', 'actionrequired', 'alldocuments', 'printing', 'completed', 'settings'],
    'DAS': ['dashboard', 'actionrequired', 'alldocuments', 'printing', 'completed', 'settings'],
    'DIRECTOR': ['dashboard', 'mysubmissions', 'actionrequired', 'printing', 'completed', 'settings'],
    'COMMS': ['dashboard', 'outgoing', 'printing', 'completed', 'settings'],
    'DO': ['dashboard', 'newsubmission', 'mysubmissions', 'actionrequired', 'completed', 'settings']
  };

  const allowedItems = navItems[role] || navItems['DO'];

  // Hide/show nav items based on role
  document.querySelectorAll('.nav-item').forEach(item => {
    const tab = item.getAttribute('data-tab');
    if (tab && !allowedItems.includes(tab)) {
      item.style.display = 'none';
    } else {
      item.style.display = 'flex';
    }
  });

  // Hide/show nav sections
  updateNavSections(role);
}

function updateNavSections(role) {
  const managementSection = document.querySelector('.nav-section-label:nth-of-type(2)');
  if (managementSection) {
    const hideForRoles = ['DO', 'DIRECTOR'];
    managementSection.style.display = hideForRoles.includes(role) ? 'none' : 'block';
  }
}

/**
 * Updates which action panels are visible in document modal based on role permissions
 */
function updateDocumentModalPermissions() {
  const role = App.currentRole;
  const canApprove = ['DIRECTOR', 'DAS', 'ASSEC', 'USEC', 'ADMIN'].includes(role);
  const canSign = role === 'SECRETARY';
  const canRelease = ['SECRETARY', 'COMMS', 'ADMIN'].includes(role);

  // Show/hide approval panel
  const approvalPanel = document.getElementById('approvalPanel');
  if (approvalPanel) {
    approvalPanel.parentElement.style.display = canApprove ? 'block' : 'none';
  }

  // Show/hide e-signature panel
  const endorsePanel = document.getElementById('endorsePanel');
  if (endorsePanel) {
    endorsePanel.parentElement.style.display = 
      ['DIRECTOR', 'DAS', 'ASSEC', 'USEC', 'DO', 'ADMIN'].includes(role) ? 'block' : 'none';
  }

  // Show/hide output panel
  const outputPanel = document.getElementById('outputPanel');
  if (outputPanel) {
    const hideOutputItems = role === 'DO';
    if (hideOutputItems) {
      outputPanel.parentElement.style.display = 'none';
    }
  }
}

// =====================================================
// CLOCK
// =====================================================
function startClock() {
  function tick() {
    const now = new Date();
    const t = now.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', hour12: false });
    const d = now.toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' });
    const el1 = document.getElementById('sidebarTime');
    const el2 = document.getElementById('sidebarDate');
    if (el1) el1.textContent = t;
    if (el2) el2.textContent = d;
  }
  tick();
  setInterval(tick, 1000);
}

// =====================================================
// USER PROFILE
// =====================================================
function loadUserProfile() {
  // Load saved preferences from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('docflow_user') || '{}');
    if (!App.currentUser) {
      if (saved.name) App.currentUser = saved;
      if (saved.role) App.currentRole = saved.role;
      if (saved.division) App.currentDivision = saved.division;
    }
  } catch(e) {}
  updateUserDisplay();
}

function updateUserDisplay() {
  const user = App.currentUser;
  const role = App.currentRole;
  const division = App.currentDivision;

  const name = user ? (user.name || user.email || 'User') : 'Officer';
  const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
  const roleLabels = { 
    ADMIN: 'Administrator',
    DO: 'Desk Officer', 
    DIRECTOR: 'Division Director', 
    DAS: 'Dep. Asst. Secretary', 
    ASSEC: 'Assistant Secretary', 
    USEC: 'Undersecretary', 
    COMMS: 'Communication Officer',
    SECRETARY: 'Secretary' 
  };
  const divLabels = { DIV1: 'Division I', DIV2: 'Division II', DIV3: 'Division III', DIV4: 'Division IV', ADMIN: 'Admin Division' };
  const roleLabel = roleLabels[role] || role;
  const divLabel = divLabels[division] || division;

  setText('userName', name);
  setText('userRole', roleLabel);
  setText('userAvatar', initials);
  setText('topbarName', name);
  setText('topbarRole', `${roleLabel}${division ? ' · ' + divLabel : ''}`);
  setText('topbarAvatar', initials);
  setText('heroName', name.split(' ')[0]);

  // Apply role color scheme to sidebar
  applyRoleColorScheme(role);

  // Populate settings
  const nameEl = document.getElementById('settingName');
  const roleEl = document.getElementById('settingRole');
  const divEl = document.getElementById('settingDivision');
  if (nameEl) nameEl.value = name;
  if (roleEl) roleEl.value = role;
  if (divEl && division) divEl.value = division;
}

/**
 * Apply visual theme based on user role
 */
function applyRoleColorScheme(role) {
  const colors = ROLE_COLORS[role] || ROLE_COLORS['DO'];
  const root = document.documentElement;
  
  // Update CSS variables for role-specific colors
  root.style.setProperty('--role-primary', colors.bg);
  root.style.setProperty('--role-light', colors.light);
  root.style.setProperty('--role-text', colors.text);
  
  // Update sidebar branding color
  const sidebar = document.querySelector('.sidebar');
  if (sidebar) {
    sidebar.style.setProperty('--navy', colors.bg, 'important');
  }

  // Add role badge to sidebar
  const brand = document.querySelector('.brand-text');
  if (brand) {
    let roleBadge = brand.querySelector('.role-badge');
    if (!roleBadge) {
      roleBadge = document.createElement('span');
      roleBadge.className = 'role-badge';
      brand.appendChild(roleBadge);
    }
    roleBadge.textContent = roleLabel;
    roleBadge.style.fontSize = '8px';
    roleBadge.style.color = 'rgba(255,255,255,0.4)';
    roleBadge.style.letterSpacing = '1px';
    roleBadge.style.textTransform = 'uppercase';
  }
}

function saveProfile() {
  const name = document.getElementById('settingName')?.value?.trim() || '';
  const role = document.getElementById('settingRole')?.value || 'DO';
  const division = document.getElementById('settingDivision')?.value || 'DIV1';
  App.currentUser = { ...App.currentUser, name };
  App.currentRole = role;
  App.currentDivision = division;
  try { 
    localStorage.setItem('docflow_user', JSON.stringify({ name, role, division })); 
    localStorage.setItem('ouma_user', JSON.stringify(App.currentUser));
  } catch(e) {}
  updateUserDisplay();
  showToast('Profile saved successfully', 'success');
}

/**
 * Logout handler
 */
function logout() {
  if (!confirm('Are you sure you want to logout?')) return;
  
  localStorage.removeItem('ouma_user');
  localStorage.removeItem('docflow_user');
  
  if (typeof google !== 'undefined') {
    google.script.run
      .withSuccessHandler(() => {
        window.location.href = '?view=login';
      })
      .logoutUser();
  } else {
    window.location.href = '?view=login';
  }
}

// =====================================================
// TAB NAVIGATION
// =====================================================
const PAGE_TITLES = {
  dashboard:     'Dashboard',
  newsubmission: 'New Submission',
  mysubmissions: 'My Submissions',
  actionrequired:'Action Required',
  alldocuments:  'All Submissions',
  esignature:    'E-Signature Queue',
  printing:      'Print Queue',
  outgoing:      'Outgoing Communications',
  completed:     'Completed Documents',
  archive:       'Archived Documents',
  settings:      'Settings'
};

function switchTab(tabName) {
  // Remove active from all nav items
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  // Add active to matching
  const navItem = document.querySelector(`.nav-item[data-tab="${tabName}"]`);
  if (navItem) navItem.classList.add('active');

  // Hide all pages
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  // Show target
  const page = document.getElementById('tab-' + tabName);
  if (page) page.classList.add('active');

  // Update breadcrumb
  setText('currentPageTitle', PAGE_TITLES[tabName] || tabName);
  App.currentTab = tabName;

  // Load tab data
  const loaders = {
    dashboard:     loadDashboard,
    mysubmissions: loadMySubmissions,
    actionrequired:loadActionRequired,
    alldocuments:  loadAllDocuments,
    esignature:    loadEsignature,
    printing:      loadPrinting,
    outgoing:      loadOutgoing,
    completed:     loadCompleted,
    archive:       loadArchive,
    newsubmission: initNewSubmission
  };
  if (loaders[tabName]) loaders[tabName]();

  // Close mobile sidebar
  document.getElementById('sidebar')?.classList.remove('mobile-open');
}

function refreshCurrentTab() {
  switchTab(App.currentTab);
}

// =====================================================
// SIDEBAR TOGGLE
// =====================================================
function setupSidebarToggle() {
  document.getElementById('sidebarToggle')?.addEventListener('click', () => {
    document.getElementById('sidebar')?.classList.toggle('collapsed');
  });
}

function setupMobileToggle() {
  document.getElementById('mobileToggle')?.addEventListener('click', () => {
    document.getElementById('sidebar')?.classList.toggle('mobile-open');
  });
}

function toggleUserMenu() {
  // Create a simple menu
  const menu = document.createElement('div');
  menu.className = 'user-menu-dropdown';
  menu.style.cssText = `
    position: absolute;
    top: 60px;
    right: 20px;
    background: white;
    border: 1px solid #dce2ef;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(15,35,70,0.1);
    z-index: 1000;
    min-width: 180px;
    overflow: hidden;
  `;
  menu.innerHTML = `
    <button onclick="switchTab('settings')" style="width:100%;padding:10px 14px;text-align:left;border:none;background:none;cursor:pointer;font-size:13px;color:#0d1b36;border-bottom:1px solid #edf0f7;">
      <i class="bi bi-gear"></i> Settings
    </button>
    <button onclick="logout()" style="width:100%;padding:10px 14px;text-align:left;border:none;background:none;cursor:pointer;font-size:13px;color:#dc2626;">
      <i class="bi bi-box-arrow-right"></i> Logout
    </button>
  `;
  
  document.body.appendChild(menu);
  
  setTimeout(() => {
    document.addEventListener('click', function removeMenu(e) {
      if (!e.target.closest('.user-menu-btn') && !e.target.closest('.user-menu-dropdown')) {
        menu.remove();
        document.removeEventListener('click', removeMenu);
      }
    });
  }, 0);
}

// =====================================================
// DASHBOARD
// =====================================================
function loadDashboard() {
  // Set placeholder stats
  setText('statTotal', App.myDocs.length || '—');
  setText('statPending', App.myDocs.filter(d => d.status === 'PENDING').length || '—');
  setText('statApproved', '—');
  setText('statReleased', '—');

  // Pipeline counts
  const statuses = ['DRAFT', 'FOR_DIRECTOR', 'FOR_DAS', 'FOR_ASSEC', 'FOR_USEC', 'COMPLETED'];
  const pipeIds = ['pipeDraft', 'pipeDirector', 'pipeDas', 'pipeAssec', 'pipeUsec', 'pipeReleased'];
  pipeIds.forEach((id, i) => {
    setText(id, App.allDocs.filter(d => d.status === statuses[i]).length);
  });

  renderRecentList();
  if (typeof google !== 'undefined') {
    google.script.run
      .withSuccessHandler(renderDashboardStats)
      .withFailureHandler(() => {})
      .getDashboardStats?.();
  }
}

function renderDashboardStats(stats) {
  if (!stats) return;
  setText('statTotal', stats.totalDocs || '—');
  setText('statPending', stats.pending || '—');
  setText('statApproved', stats.approvedToday || '—');
  setText('statReleased', stats.released || '—');
}

function renderRecentList() {
  const container = document.getElementById('recentList');
  if (!container) return;
  if (!App.myDocs.length) {
    container.innerHTML = `<div class="empty-state small"><i class="bi bi-inbox"></i><span>No recent submissions</span></div>`;
    return;
  }
  const recent = App.myDocs.slice(0, 5);
  container.innerHTML = recent.map(doc => `
    <div class="recent-item" onclick="openDocumentModal('${esc(doc.id)}')">
      <span class="recent-item-type doc-type-chip ${getTypeClass(doc.type)}">${esc(doc.type)}</span>
      <span class="recent-item-title">${esc(doc.subject)}</span>
      <span class="recent-item-status" style="color:${getStatusColor(doc.status)}">${formatStatus(doc.status)}</span>
    </div>
  `).join('');
}

// =====================================================
// NEW SUBMISSION
// =====================================================
let currentStep = 1;

function initNewSubmission() {
  // Hide for non-DO and non-ADMIN roles
  if (!['DO', 'ADMIN', 'DIRECTOR'].includes(App.currentRole)) {
    switchTab('dashboard');
    showToast('You do not have permission to create submissions', 'error');
    return;
  }

  currentStep = 1;
  renderStep(1);
  App.selectedFile = null;
  App.googleDocLink = '';
  App.endorseTarget = 'Director';
  // Reset form
  ['docType','docAddressee','docSubject','docRemarks','googleDocsLink'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('uploadPreview').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('attachmentNote').style.display = 'none';
  setActiveEndorsee('Director');
}

function renderStep(n) {
  for (let i = 1; i <= 3; i++) {
    const stepEl = document.getElementById('step' + i);
    const indEl = document.getElementById('step' + i + 'Ind');
    if (stepEl) stepEl.classList.toggle('active', i === n);
    if (indEl) {
      indEl.classList.toggle('active', i === n);
      indEl.classList.toggle('done', i < n);
    }
  }
  currentStep = n;
  if (n === 3) populateReview();
}

function goToStep(n) {
  if (n === 2 && !validateStep1()) return;
  if (n === 3 && !validateStep2()) return;
  renderStep(n);
}

function validateStep1() {
  const type = document.getElementById('docType')?.value;
  const addr = document.getElementById('docAddressee')?.value?.trim();
  const subj = document.getElementById('docSubject')?.value?.trim();
  if (!type) { showToast('Please select a document type', 'error'); return false; }
  if (!addr) { showToast('Please enter the addressee', 'error'); return false; }
  if (!subj) { showToast('Please enter the subject', 'error'); return false; }
  // Show attachment note for MFS types
  if (['MFS','MFP'].includes(type)) {
    document.getElementById('attachmentNote').style.display = 'flex';
  }
  return true;
}

function validateStep2() {
  const link = document.getElementById('googleDocsLink')?.value?.trim();
  if (!App.selectedFile && !link) {
    showToast('Please upload a file or provide a Google Docs link', 'error');
    return false;
  }
  App.googleDocLink = link;
  return true;
}

function populateReview() {
  const type = document.getElementById('docType')?.value || '—';
  const addr = document.getElementById('docAddressee')?.value || '—';
  const subj = document.getElementById('docSubject')?.value || '—';
  const div  = document.getElementById('docDivision')?.value || '—';
  const prio = document.getElementById('docPriority')?.value || '—';
  const rem  = document.getElementById('docRemarks')?.value || '—';
  const divLabels = { DIV1: 'Division I', DIV2: 'Division II', DIV3: 'Division III', DIV4: 'Division IV', ADMIN: 'Admin Division' };
  const fileName = App.selectedFile ? App.selectedFile.name : (App.googleDocLink ? 'Google Docs Link' : '—');
  const today = new Date().toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
  const docId = generateDocName(type, addr, subj);

  document.getElementById('reviewGrid').innerHTML = `
    <div class="review-item"><span class="rlabel">Document ID</span><span class="rvalue">${esc(docId)}</span></div>
    <div class="review-item"><span class="rlabel">Date</span><span class="rvalue">${today}</span></div>
    <div class="review-item"><span class="rlabel">Document Type</span><span class="rvalue">${esc(type)}</span></div>
    <div class="review-item"><span class="rlabel">Priority</span><span class="rvalue">${esc(prio)}</span></div>
    <div class="review-item span-2"><span class="rlabel">Addressee</span><span class="rvalue">${esc(addr)}</span></div>
    <div class="review-item span-2" style="grid-column:span 2"><span class="rlabel">Subject</span><span class="rvalue">${esc(subj)}</span></div>
    <div class="review-item"><span class="rlabel">Division</span><span class="rvalue">${esc(divLabels[div] || div)}</span></div>
    <div class="review-item"><span class="rlabel">File</span><span class="rvalue">${esc(fileName)}</span></div>
    <div class="review-item span-2" style="grid-column:span 2"><span class="rlabel">Remarks</span><span class="rvalue">${esc(rem)}</span></div>
  `;
}

function generateDocName(type, addr, subj) {
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yyyy = d.getFullYear();
  const addrShort = addr.split(/\s+/).slice(0,3).join('_').replace(/[^a-zA-Z_]/g,'');
  const subjShort = subj.split(/\s+/).slice(0,4).join('_').replace(/[^a-zA-Z_0-9]/g,'');
  return `${mm}${dd}${yyyy}_${type}_${addrShort}_${subjShort}`;
}

function selectEndorsee(target) {
  App.endorseTarget = target;
  setActiveEndorsee(target);
}

function setActiveEndorsee(target) {
  ['Director','DAS','AsSec','USec'].forEach(t => {
    const btn = document.getElementById('end' + t.replace(' ',''));
    if (btn) btn.classList.toggle('active', t === target);
  });
}

function saveDraftOnly() {
  saveDocument('DRAFT');
}

function submitDocument() {
  saveDocument('SUBMIT');
}

function saveDocument(mode) {
  const type   = document.getElementById('docType')?.value || '';
  const addr   = document.getElementById('docAddressee')?.value?.trim() || '';
  const subj   = document.getElementById('docSubject')?.value?.trim() || '';
  const div    = document.getElementById('docDivision')?.value || 'DIV1';
  const prio   = document.getElementById('docPriority')?.value || 'ROUTINE';
  const rem    = document.getElementById('docRemarks')?.value?.trim() || '';
  const link   = document.getElementById('googleDocsLink')?.value?.trim() || '';

  const doc = {
    id:          'DOC-' + Date.now(),
    docId:       generateDocName(type, addr, subj),
    type, addr, subject: subj, division: div,
    priority: prio, remarks: rem,
    fileLink:    link || (App.selectedFile ? '[uploaded]' : ''),
    submittedBy: App.currentUser?.name || 'Officer',
    division:    div,
    status:      mode === 'DRAFT' ? 'DRAFT' : 'FOR_' + App.endorseTarget.toUpperCase().replace(' ','_'),
    endorseTo:   App.endorseTarget,
    createdAt:   new Date().toISOString(),
    versions:    [{ label: 'v1 — Initial Draft', by: App.currentUser?.name, date: new Date().toISOString() }],
    comments:    [],
    trail:       [{ step: 'Submitted', by: App.currentUser?.name, date: new Date().toISOString(), status: 'done' }]
  };

  App.myDocs.unshift(doc);
  App.allDocs.unshift(doc);

  if (typeof google !== 'undefined') {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) showToast(mode === 'DRAFT' ? 'Draft saved!' : 'Document submitted!', 'success');
        else showToast('Saved locally', 'success');
      })
      .withFailureHandler(() => showToast(mode === 'DRAFT' ? 'Draft saved locally' : 'Document submitted locally', 'success'))
      .saveDocument?.(doc);
  } else {
    showToast(mode === 'DRAFT' ? 'Draft saved!' : `Document submitted to ${App.endorseTarget}!`, 'success');
  }

  setTimeout(() => switchTab('mysubmissions'), 800);
}

// FILE UPLOAD
function triggerFileInput() { document.getElementById('fileInput')?.click(); }

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) showFilePreview(file);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone')?.classList.add('dragover');
}

function handleDragLeave(e) {
  document.getElementById('uploadZone')?.classList.remove('dragover');
}

function handleDrop(e) {

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', warning: 'bi-exclamation-triangle-fill', info: 'bi-info-circle-fill' };
  toast.innerHTML = `<i class="bi ${icons[type] || icons.info}"></i> ${esc(message)}`;

// =====================================================
// HELPERS
// =====================================================
function el(id) { return document.getElementById(id); }
function setText(id, text) { const e = document.getElementById(id); if (e) e.textContent = text; }
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function findDoc(id) {
  return App.myDocs.find(d => d.id === id) || App.allDocs.find(d => d.id === id);
}

function matchStatus(docStatus, filter) {
  const map = {
    'DRAFT':       ['DRAFT'],
    'PENDING':     ['FOR_DIRECTOR','FOR_DAS','FOR_ASSEC','FOR_USEC','FOR_SIGNATURE'],
    'APPROVED':    ['FOR_PRINTING','FOR_OUTGOING'],
    'RETURNED':    ['RETURNED'],
    'COMPLETED':   ['COMPLETED'],
    'FOR_DIRECTOR':['FOR_DIRECTOR'],
    'FOR_DAS':     ['FOR_DAS'],
    'FOR_ASSEC':   ['FOR_ASSEC'],
    'FOR_USEC':    ['FOR_USEC'],
    'FOR_SIGNATURE':['FOR_SIGNATURE']
  };
  return (map[filter] || []).includes(docStatus);
}

function formatStatus(status) {
  const labels = {
    DRAFT:          'Draft',
    FOR_DIRECTOR:   'For Director',
    FOR_DAS:        'For DAS',
    FOR_ASSEC:      'For AsSec',
    FOR_USEC:       'For USec',
    FOR_SIGNATURE:  'For Signature',
    FOR_PRINTING:   'For Printing',
    FOR_OUTGOING:   'For Outgoing',
    RETURNED:       'Returned',
    COMPLETED:      'Completed'
  };
  return labels[status] || status;
}

function getStatusPillClass(status) {
  if (!status) return 'draft';
  if (status === 'DRAFT') return 'draft';
  if (status === 'RETURNED') return 'returned';
  if (status === 'COMPLETED') return 'completed';
  if (status === 'FOR_SIGNATURE') return 'signature';
  if (status.startsWith('FOR_')) return 'pending';
  return 'draft';
}

function getStatusColor(status) {
  const colors = { DRAFT: 'var(--text-3)', RETURNED: 'var(--red)', COMPLETED: 'var(--blue)' };
  return colors[status] || 'var(--orange)';
}

function getTypeClass(type) {
  const map = { MEMO: 'memo', LTR: 'ltr', CIR: 'cir', RPT: 'rpt', MFS: 'mfs', MFP: 'mfs', DAO: 'cir', DM: 'memo' };
  return map[type] || 'other';
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  try {
    const d = new Date(dateStr);
    if (isNaN(d)) return String(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
    if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
    if (diff < 604800) return Math.floor(diff / 86400) + ' days ago';
    return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch(e) { return String(dateStr); }
}

function formatFileSize(bytes) {
  if (!bytes) return '—';
  const n = Number(bytes);
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1048576).toFixed(1) + ' MB';
}
